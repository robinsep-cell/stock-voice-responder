<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Voice Responder</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Stock Voice</h1>
        <p class="subtitle">Responde consultas de stock con tu voz</p>
    </header>

    <div class="container" id="cards-container">
        <!-- Loader during initial fetch -->
        <div style="text-align: center; padding: 2rem;" id="main-loader">
            <div class="loader" style="display: inline-block; border-top-color: var(--primary);"></div>
            <p style="margin-top: 1rem; color: var(--text-muted);">Cargando consultas pendientes...</p>
        </div>
    </div>

    <div class="refresh-bar">
        <button class="refresh-btn" id="refresh-btn">
            <i class="fas fa-sync-alt" id="refresh-icon"></i> Sincronizar
        </button>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
